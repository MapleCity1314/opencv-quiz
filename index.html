<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>复习题中心</title>
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--border:#30363d;--text:#e6edf3;--muted:#8b949e;--r:12px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:2rem;margin-bottom:8px;text-align:center}
.sub{color:var(--muted);font-size:.95rem;margin-bottom:48px;text-align:center}
.cards{display:flex;gap:24px;flex-wrap:wrap;justify-content:center}
.card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:32px 36px;width:300px;text-decoration:none;color:var(--text);transition:all .2s;display:block}
.card:hover{transform:translateY(-4px)}
.card.cv{border-color:#00b4d820}
.card.cv:hover{border-color:#00b4d8;box-shadow:0 8px 30px rgba(0,180,216,.2)}
.card.dl{border-color:#a78bfa20}
.card.dl:hover{border-color:#a78bfa;box-shadow:0 8px 30px rgba(167,139,250,.2)}
.icon{font-size:2.8rem;margin-bottom:16px}
.card h2{font-size:1.15rem;margin-bottom:8px}
.card p{color:var(--muted);font-size:.85rem;line-height:1.5}
.badge{display:inline-block;font-size:.75rem;padding:2px 10px;border-radius:20px;margin-top:14px;font-weight:600}
.card.cv .badge{background:#00b4d820;color:#00b4d8}
.card.dl .badge{background:#a78bfa20;color:#a78bfa}
.card.xs{border-color:#ef444420}
.card.xs:hover{border-color:#ef4444;box-shadow:0 8px 30px rgba(239,68,68,.2)}
.card.xs .badge{background:#ef444420;color:#ef4444}
</style>
</head>
<body>
<h1>复习题中心</h1>
<p class="sub">选择科目开始答题</p>
<div class="cards">
  <a href="quiz.html" class="card cv">
    <div class="icon">👁️</div>
    <h2>OpenCV 计算机视觉</h2>
    <p>7章内容 · 130+ 道题<br>单选题 · 填空题 · 代码填空</p>
    <span class="badge">开始答题 →</span>
  </a>
  <a href="dl-quiz.html" class="card dl">
    <div class="icon">🧠</div>
    <h2>深度学习</h2>
    <p>4章内容 · 43 道题<br>单选题 · 填空题 · 简答题 · 程序设计</p>
    <span class="badge">开始答题 →</span>
  </a>
  <a href="xinsi-quiz.html" class="card xs">
    <div class="icon">📖</div>
    <h2>新思想概论</h2>
    <p>18章内容 · 220+ 道题<br>单选题 · 判断题 · 论述题</p>
    <span class="badge">开始答题 →</span>
  </a>
</div>
</body>
</html>
