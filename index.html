<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>OpenCV 复习题</title>
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--ac:#00b4d8;--ac2:#0077b6;--green:#3fb950;--red:#f85149;--yellow:#e3b341;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.page{display:none;min-height:100vh;padding:20px}
.page.active{display:block}
/* HOME */
.home-header{text-align:center;padding:40px 0 30px}
.home-header h1{font-size:2.2rem;background:linear-gradient(135deg,var(--ac),#90e0ef);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.home-header p{color:var(--muted);font-size:1rem}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;max-width:1100px;margin:0 auto 30px}
.ch-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:20px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.ch-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 4px 20px rgba(0,180,216,.15)}
.ch-card h3{font-size:1rem;margin-bottom:6px;color:var(--text)}
.ch-card .meta{font-size:.82rem;color:var(--muted);margin-bottom:12px}
.ch-card .progress-wrap{background:var(--s2);border-radius:4px;height:6px;margin-bottom:8px}
.ch-card .progress-bar{background:linear-gradient(90deg,var(--ac),var(--ac2));height:6px;border-radius:4px;transition:width .4s}
.ch-card .score-label{font-size:.8rem;color:var(--muted)}
.ch-card .score-label span{color:var(--ac);font-weight:600}
.ch-num{position:absolute;top:16px;right:16px;font-size:1.8rem;font-weight:700;color:var(--border)}
.reset-btn{display:block;margin:0 auto;background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .2s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
/* QUIZ */
.quiz-topbar{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto 16px;padding:0 4px}
.back-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;flex-shrink:0}
.back-btn:hover{border-color:var(--ac)}
.quiz-title-bar{flex:1;min-width:0}
.quiz-ch-name{font-size:.85rem;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.quiz-counter{font-size:.9rem;color:var(--ac);font-weight:600;flex-shrink:0}
.top-progress{background:var(--s2);height:4px;border-radius:2px;max-width:800px;margin:0 auto 20px}
.top-progress-fill{height:4px;border-radius:2px;background:linear-gradient(90deg,var(--ac),var(--ac2));transition:width .3s}
.question-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px;max-width:800px;margin:0 auto 16px}
.type-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.75rem;font-weight:600;margin-bottom:14px}
.badge-mc{background:rgba(0,180,216,.15);color:var(--ac);border:1px solid rgba(0,180,216,.3)}
.badge-fill{background:rgba(227,179,65,.12);color:var(--yellow);border:1px solid rgba(227,179,65,.3)}
.badge-code{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.q-text{font-size:1rem;line-height:1.7;margin-bottom:18px;color:var(--text)}
.q-text code{background:var(--s2);padding:1px 6px;border-radius:4px;font-family:'Cascadia Code','Consolas',monospace;font-size:.88em;color:#79c0ff}
.q-text pre{background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:14px;margin:10px 0;overflow-x:auto;font-family:'Cascadia Code','Consolas',monospace;font-size:.88em;line-height:1.6;color:#e6edf3}
.q-text pre code{background:none;padding:0;font-size:1em;color:inherit}
.matrix-table{border-collapse:collapse;margin:8px 0;font-family:'Cascadia Code','Consolas',monospace;font-size:.9em}
.matrix-table td{border:1px solid var(--border);padding:5px 10px;text-align:center;color:#79c0ff}
.pixel-grid{border-collapse:collapse;margin:8px 0;font-size:.88em}
.pixel-grid td{border:1px solid var(--border);padding:6px 10px;text-align:center;min-width:40px}
.pixel-grid .hl{background:rgba(0,180,216,.2);font-weight:600;color:var(--ac)}
/* MC options */
.options{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:12px 16px;cursor:pointer;text-align:left;font-size:.95rem;color:var(--text);transition:all .2s;display:flex;align-items:flex-start;gap:10px}
.opt-btn:hover:not(.disabled){border-color:var(--ac);background:rgba(0,180,216,.07)}
.opt-btn.disabled{cursor:default}
.opt-btn.correct{border-color:var(--green);background:rgba(63,185,80,.12);color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:rgba(248,81,73,.1);color:var(--red)}
.opt-btn.reveal{border-color:var(--green);background:rgba(63,185,80,.07)}
.opt-key{font-weight:700;flex-shrink:0;min-width:22px}
/* Fill input */
.fill-area{display:flex;gap:10px;margin-top:6px;flex-wrap:wrap}
.fill-input{flex:1;min-width:200px;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:10px 14px;color:var(--text);font-size:.95rem;outline:none}
.fill-input:focus{border-color:var(--ac)}
.fill-input.correct{border-color:var(--green);background:rgba(63,185,80,.08)}
.fill-input.wrong{border-color:var(--red);background:rgba(248,81,73,.08)}
.submit-btn{background:var(--ac2);color:#fff;border:none;border-radius:6px;padding:10px 20px;cursor:pointer;font-size:.9rem;font-weight:600;transition:background .2s}
.submit-btn:hover{background:var(--ac)}
.reveal-btn{background:var(--s2);border:1px solid var(--border);color:var(--muted);border-radius:6px;padding:10px 16px;cursor:pointer;font-size:.85rem;transition:all .2s}
.reveal-btn:hover{border-color:var(--yellow);color:var(--yellow)}
/* Code blanks */
.code-block{background:var(--s2);border:1px solid var(--border);border-radius:8px;padding:16px;font-family:'Cascadia Code','Consolas',monospace;font-size:.87em;line-height:1.7;overflow-x:auto;white-space:pre;color:#e6edf3;margin-bottom:14px}
.blank-marker{background:rgba(0,180,216,.2);border:1px dashed var(--ac);border-radius:3px;padding:0 6px;color:var(--ac);font-weight:700;cursor:help}
.blanks-inputs{display:flex;flex-direction:column;gap:8px;margin-top:8px}
.blank-row{display:flex;align-items:center;gap:10px}
.blank-label{color:var(--ac);font-weight:700;min-width:24px;font-family:'Cascadia Code','Consolas',monospace}
.blank-field{flex:1;background:var(--s2);border:1px solid var(--border);border-radius:6px;padding:8px 12px;color:var(--text);font-family:'Cascadia Code','Consolas',monospace;font-size:.88em;outline:none}
.blank-field:focus{border-color:var(--ac)}
.blank-field.correct{border-color:var(--green);background:rgba(63,185,80,.08)}
.blank-field.wrong{border-color:var(--red);background:rgba(248,81,73,.08)}
.blank-ans{font-size:.82rem;color:var(--green);margin-left:8px;display:none}
/* Feedback */
.feedback-panel{max-width:800px;margin:0 auto 16px;border-radius:var(--r);padding:14px 18px;display:none;border:1px solid var(--border)}
.feedback-panel.show{display:block}
.feedback-panel.correct{border-color:rgba(63,185,80,.4);background:rgba(63,185,80,.07)}
.feedback-panel.wrong{border-color:rgba(248,81,73,.4);background:rgba(248,81,73,.07)}
.feedback-panel.neutral{border-color:rgba(227,179,65,.35);background:rgba(227,179,65,.07)}
.fb-title{font-weight:700;margin-bottom:6px;font-size:.95rem}
.fb-exp{font-size:.88rem;line-height:1.6;color:var(--muted)}
.fb-ans{font-size:.9rem;margin-bottom:6px;color:var(--text)}
.fb-ans strong{color:var(--green)}
/* Nav */
.quiz-nav{display:flex;justify-content:space-between;align-items:center;max-width:800px;margin:0 auto;padding-bottom:30px}
.nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:var(--ac);color:var(--ac)}
.nav-btn:disabled{opacity:.35;cursor:default}
.nav-btn.primary{background:var(--ac2);border-color:var(--ac2);color:#fff}
.nav-btn.primary:hover:not(:disabled){background:var(--ac)}
/* Results */
.results-wrap{max-width:700px;margin:0 auto;padding:30px 0}
.results-title{text-align:center;font-size:1.8rem;font-weight:700;margin-bottom:6px}
.results-score{text-align:center;font-size:3.5rem;font-weight:700;color:var(--ac);margin:16px 0 4px}
.results-sub{text-align:center;color:var(--muted);margin-bottom:28px}
.ch-results{display:flex;flex-direction:column;gap:10px;margin-bottom:28px}
.ch-result-row{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;justify-content:space-between}
.ch-result-row .ch-name{font-size:.9rem}
.ch-result-row .ch-score{font-weight:600;color:var(--ac)}
.wrong-section{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;margin-bottom:24px}
.wrong-section h3{margin-bottom:14px;color:var(--yellow)}
.wrong-item{padding:10px 0;border-bottom:1px solid var(--border);font-size:.88rem}
.wrong-item:last-child{border-bottom:none}
.wrong-item .wi-q{color:var(--muted);margin-bottom:4px}
.wrong-item .wi-ans{color:var(--green)}
.wrong-item .wi-yours{color:var(--red)}
.results-btns{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
.results-btns button{padding:10px 24px;border-radius:8px;cursor:pointer;font-size:.9rem;font-weight:600;border:none}
.btn-home2{background:var(--s2);color:var(--text);border:1px solid var(--border)!important}
.btn-redo{background:var(--ac2);color:#fff}
</style>
</head>
<body>

<!-- HOME -->
<div id="page-home" class="page active">
  <div class="home-header">
    <h1>OpenCV 复习题</h1>
    <p>共 8 章节 · 130+ 道题 · 含即时反馈与解析</p>
  </div>
  <div class="chapter-grid" id="chapter-grid"></div>
  <div style="text-align:center;padding-bottom:40px">
    <button class="reset-btn" onclick="resetAll()">重置所有答题记录</button>
  </div>
</div>

<!-- QUIZ -->
<div id="page-quiz" class="page">
  <div class="quiz-topbar">
    <button class="back-btn" onclick="goHome()">← 章节</button>
    <div class="quiz-title-bar">
      <div class="quiz-ch-name" id="quiz-ch-name"></div>
    </div>
    <div class="quiz-counter" id="quiz-counter"></div>
  </div>
  <div class="top-progress"><div class="top-progress-fill" id="top-prog-fill"></div></div>
  <div class="question-card">
    <span class="type-badge" id="type-badge"></span>
    <div class="q-text" id="q-text"></div>
    <div id="q-body"></div>
  </div>
  <div class="feedback-panel" id="feedback-panel">
    <div class="fb-title" id="fb-title"></div>
    <div class="fb-ans" id="fb-ans"></div>
    <div class="fb-exp" id="fb-exp"></div>
  </div>
  <div class="quiz-nav">
    <button class="nav-btn" id="btn-prev" onclick="prevQ()">← 上一题</button>
    <button class="nav-btn primary" id="btn-next" onclick="nextQ()">下一题 →</button>
  </div>
</div>

<!-- RESULTS -->
<div id="page-results" class="page">
  <div class="results-wrap">
    <div class="results-title">答题完成！</div>
    <div class="results-score" id="res-score"></div>
    <div class="results-sub" id="res-sub"></div>
    <div class="ch-results" id="ch-results"></div>
    <div class="wrong-section" id="wrong-section" style="display:none">
      <h3>错题回顾</h3>
      <div id="wrong-list"></div>
    </div>
    <div class="results-btns">
      <button class="btn-home2" style="border:1px solid var(--border)" onclick="goHome()">返回主页</button>
      <button class="btn-redo" onclick="redoChapter()">重做本章</button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────
// QUESTION DATA
// ─────────────────────────────────────────
const CHAPTERS = [
{
  id:'ch1', title:'第1章：计算机视觉与数字图像基础',
  questions:[
    {type:'mc',q:'下列关于计算机视觉说法正确的是：',
     opts:['人工智能技术不能应用到计算机视觉中','计算机视觉是研究如何让计算机像人一样"看"的科学','人脸识别不属于计算机视觉','计算机视觉不能理解图像中内容'],
     ans:1,exp:'计算机视觉让计算机具备"看"并理解图像的能力；大量使用 AI 技术，人脸识别是其典型应用，A/C/D 均与事实相反。'},
    {type:'mc',q:'关于数字图像的采集，下列说法正确的是：',
     opts:['数字图像的采集过程是将数字图像转换为连续图像','数字图像成像的质量只由传感器的单元数决定','图像数字化的过程包括两部分，分别为采样和量化','传感器的尺寸能完全决定数字图像的成像质量'],
     ans:2,exp:'数字化 = 采样（空间离散化）+ 量化（幅值离散化）。采集是把连续图像→数字图像（A反了）；成像质量受多因素影响（B/D错）。'},
    {type:'mc',q:'关于数字图像的分辨率，下列说法正确的是：',
     opts:['图像的分辨率越高，则图像的像素的数量越少，数据量越小','图像的分辨率越高，则图像的像素的数量越多，数据量越大','图像的分辨率越低，则图像的像素的数量越多，数据量越小','图像的分辨率越低，则图像的像素的数量越少，数据量越大'],
     ans:1,exp:'分辨率越高 → 像素越多 → 数据量越大，只有 B 对。'},
    {type:'mc',q:'以下描述了四幅图像，哪幅图像的分辨率最高？',
     opts:['图像A：4096×3072像素，画面最清晰细腻，马赛克块最小','图像B：2048×1536像素，画面较清晰','图像C：1024×768像素，画面一般','图像D：512×384像素，画面模糊，马赛克块最大'],
     ans:0,exp:'分辨率越高，图像越清晰、像素块越细腻。4096×3072 像素数最多，分辨率最高。'},
    {type:'mc',q:'一幅8位的图像，则该图像的灰度级为：',
     opts:['128级','64级','512级','256级'],
     ans:3,exp:'灰度级数 = 2^位深 = 2^8 = 256 级（取值 0~255）。'},
    {type:'mc',q:'以下描述了四幅图像，哪幅图像的灰度级最大？',
     opts:['图像A：只有2级灰度，黑白对比强烈，几乎无过渡','图像B：只有4级灰度，明暗过渡非常少','图像C：16级灰度，有一定层次','图像D：256级灰度，明暗过渡极其平滑细腻'],
     ans:3,exp:'灰度级越多，明暗过渡越平滑、细节越丰富。256级（D）最多。'},
    {type:'mc',q:'对于一幅 M×N 分辨率的数字图像，左上角像素的坐标为(0,0)，则水平坐标（横坐标）范围是：',
     opts:['[0, M-1]','[0, M]','[0, N-1]','[0, N]'],
     ans:2,exp:'M×N 为 M 行 N 列。横坐标对应"列"，共 N 列，索引从 0 开始，范围为 [0, N-1]。'},
    {type:'mc',q:'灰度图的通道数为：',
     opts:['3','2','1','0'],
     ans:2,exp:'灰度图每个像素仅一个亮度值，通道数为 1。'},
    {type:'mc',q:'彩色图像的通道数为：',
     opts:['3','2','1','0'],
     ans:0,exp:'彩色图像由 R、G、B 三个通道组成，通道数为 3。'},
    {type:'mc',q:'按照 RGB 的方式，下列哪个选项表示纯红色？',
     opts:['(0, 0, 255)','(255, 0, 0)','(0, 255, 0)','(255, 255, 0)'],
     ans:1,exp:'RGB 顺序下 (R,G,B)：纯红 = (255,0,0)。注意 OpenCV 的 BGR 顺序纯红写作 (0,0,255)，本题明确按 RGB。'},
    {type:'fill',q:'图像数字化的过程包括（　　）和量化。',ans:['采样'],exp:'数字化 = 采样 + 量化。'},
    {type:'fill',q:'图像数字化的过程包括采样和（　　）。',ans:['量化'],exp:'数字化 = 采样 + 量化。'},
    {type:'fill',q:'采样后得到离散图像的尺寸称为（　　）。',ans:['分辨率'],exp:'采样结果的空间尺寸即分辨率。'},
    {type:'fill',q:'将像素灰度转换成离散的整数值的过程称为（　　）。',ans:['量化'],exp:'量化：幅值离散化，把连续灰度映射为整数值。'},
    {type:'fill',q:'一幅8位图像共有（　　）级灰度级。',ans:['256'],exp:'2^8 = 256。'},
  ]
},
{
  id:'ch2', title:'第2章：OpenCV 基础操作',
  questions:[
    {type:'mc',q:'OpenCV 中用于显示图像的函数为：',
     opts:['cv2.read()','cv2.imshow()','cv2.showImage()','cv2.imageRead()'],
     ans:1,exp:'显示用 cv2.imshow(winname, mat)；读取用 cv2.imread()。'},
    {type:'mc',q:'关于图像处理的基本过程，下列哪个选项是正确的：',
     opts:['读取图像、对图像进行相应处理操作、查看处理后的结果、保存图像','读取图像、保存图像、对图像进行相应处理操作、查看处理后的结果','读取图像、查看处理后的结果、对图像进行相应处理操作、保存图像','读取图像、对图像进行相应处理操作、保存图像、查看处理后的结果'],
     ans:0,exp:'合理流程：读取 → 处理 → 查看结果 → 保存。'},
    {type:'mc',q:'关于 cv2.destroyAllWindows() 函数，说法正确的是：',
     opts:['该函数的参数不能省略','该函数的返回值为对应按键的字符','该函数的功能是等待用户按键','该函数的作用是销毁窗口'],
     ans:3,exp:'destroyAllWindows() 销毁所有 OpenCV 窗口，无参数、无返回值；等待按键是 waitKey()。'},
    {type:'mc',q:'OpenCV 中用于保存图像的函数为：',
     opts:['cv2.imread()','cv2.write()','cv2.writeImage()','cv2.imwrite()'],
     ans:3,exp:'保存图像用 cv2.imwrite(filename, img)。'},
    {type:'mc',q:'关于视频的说法正确的是：',
     opts:['OpenCV 中，读取视频的方法为 cv2.read()','视频实际上是由一系列图像构成的，这一系列图像被称为帧','帧速率的单位是 秒/帧','OpenCV 中，不能处理视频信号'],
     ans:1,exp:'视频是连续帧序列；读取用 VideoCapture.read()；帧率单位是 帧/秒(fps)；OpenCV 可处理视频。'},
    {type:'mc',q:'OpenCV 中，一幅彩色图像的通道顺序为：',
     opts:['RGB','BRG','GBR','BGR'],
     ans:3,exp:'OpenCV 默认通道顺序为 BGR（区别于常见的 RGB）。'},
    {type:'mc',q:'关于下列代码，说法正确的是：\n<pre><code>img = np.ones((300,300,3), np.uint8) * 255</code></pre>',
     opts:['img 为灰度图像','img 为白色图像','img 为黑色图像','img 为蓝色图像'],
     ans:1,exp:'三通道全部为 255 → 白色。'},
    {type:'mc',q:'关于下列代码，说法正确的是：\n<pre><code>img = np.zeros((300,300,3), np.uint8)</code></pre>',
     opts:['img 为灰度图像','img 为白色图像','img 为黑色图像','img 为蓝色图像'],
     ans:2,exp:'三通道全部为 0 → 黑色。'},
    {type:'mc',q:'关于 cv2.waitKey([delay]) 函数，下列说法正确的是：',
     opts:['delay 表示等待键盘触发的时间，单位是 s（秒）','该函数的参数 delay 不能省略','该函数的参数 delay 可以省略，默认值为 1','该函数表示等待用户按键，当用户按下键盘后，该语句会被执行'],

// ─────────────────────────────────────────
// STATE
// ─────────────────────────────────────────
const KEYS = {answers:'ocv_answers', current:'ocv_current'};
let state = {chIdx:0, qIdx:0, answered:false};
let answers = {};  // key: "ch1-3" → {chosen, correct}

function loadData(){
  try{ answers = JSON.parse(localStorage.getItem(KEYS.answers)||'{}'); }catch(e){}
}
function saveData(){ localStorage.setItem(KEYS.answers, JSON.stringify(answers)); }
function ansKey(chIdx,qIdx){ return CHAPTERS[chIdx].id+'-'+qIdx; }

// ─────────────────────────────────────────
// PAGE NAV
// ─────────────────────────────────────────
function showPage(id){
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));
  document.getElementById('page-'+id).classList.add('active');
  window.scrollTo(0,0);
}
function goHome(){ renderHome(); showPage('home'); }

function resetAll(){
  if(!confirm('确定要重置所有答题记录吗？')) return;
  answers={};
  saveData();
  renderHome();
}

// ─────────────────────────────────────────
// HOME
// ─────────────────────────────────────────
function renderHome(){
  const grid = document.getElementById('chapter-grid');
  grid.innerHTML = '';
  CHAPTERS.forEach((ch,i)=>{
    const total = ch.questions.length;
    const done = ch.questions.filter((_,qi)=>answers[ch.id+'-'+qi]!==undefined).length;
    const correct = ch.questions.filter((_,qi)=>{const a=answers[ch.id+'-'+qi];return a&&a.correct;}).length;
    const pct = total ? Math.round(done/total*100) : 0;
    const card = document.createElement('div');
    card.className='ch-card';
    card.onclick=()=>startChapter(i);
    card.innerHTML=`
      <div class="ch-num">${i<7?i+1:'综'}</div>
      <h3>${ch.title}</h3>
      <div class="meta">${total} 道题${done?` · 已答 ${done}/${total}`:''}${done?` · 得分 ${correct}/${done}`:''}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="score-label">${done===total&&total>0?`<span>✓ 已完成</span>`:(done?`进度 ${pct}%`:'点击开始')}</div>
    `;
    grid.appendChild(card);
  });
}

// ─────────────────────────────────────────
// CHAPTER START
// ─────────────────────────────────────────
function startChapter(chIdx){
  state.chIdx = chIdx;
  // Start from first unanswered, or 0
  const ch = CHAPTERS[chIdx];
  let start = 0;
  for(let i=0;i<ch.questions.length;i++){
    if(!answers[ch.id+'-'+i]){start=i;break;}
    if(i===ch.questions.length-1) start=0;
  }
  state.qIdx = start;
  state.answered = !!answers[ch.id+'-'+start];
  renderQuestion();
  showPage('quiz');
}

// ─────────────────────────────────────────
// QUESTION RENDER
// ─────────────────────────────────────────
function renderQuestion(){
  const ch = CHAPTERS[state.chIdx];
  const q = ch.questions[state.qIdx];
  const total = ch.questions.length;
  const ki = state.qIdx;
  const key = ch.id+'-'+ki;
  const prev = answers[key];
  state.answered = !!prev;

  // Header
  document.getElementById('quiz-ch-name').textContent = ch.title;
  document.getElementById('quiz-counter').textContent = `${ki+1} / ${total}`;
  const pct = Math.round((ki+1)/total*100);
  document.getElementById('top-prog-fill').style.width = pct+'%';

  // Badge
  const badge = document.getElementById('type-badge');
  if(q.type==='mc'){ badge.className='type-badge badge-mc'; badge.textContent='单选题'; }
  else if(q.type==='fill'){ badge.className='type-badge badge-fill'; badge.textContent='填空题'; }
  else { badge.className='type-badge badge-code'; badge.textContent='代码填空'; }

  // Question text
  document.getElementById('q-text').innerHTML = q.q;

  // Body
  const body = document.getElementById('q-body');
  body.innerHTML='';

  if(q.type==='mc'){
    const wrap = document.createElement('div');
    wrap.className='options';
    const letters=['A','B','C','D'];
    q.opts.forEach((opt,oi)=>{
      const btn = document.createElement('button');
      btn.className='opt-btn';
      btn.innerHTML=`<span class="opt-key">${letters[oi]}.</span><span>${opt}</span>`;
      if(prev){
        btn.classList.add('disabled');
        if(oi===q.ans) btn.classList.add('correct');
        else if(prev.chosen===oi) btn.classList.add('wrong');
      } else {
        btn.onclick=()=>submitMC(oi);
      }
      wrap.appendChild(btn);
    });
    body.appendChild(wrap);
  } else if(q.type==='fill'){
    const wrap = document.createElement('div');
    wrap.className='fill-area';
    const inp = document.createElement('input');
    inp.type='text'; inp.className='fill-input'; inp.placeholder='请输入答案...';
    inp.id='fill-inp';
    if(prev){ inp.value=prev.chosen; inp.disabled=true; inp.classList.add(prev.correct?'correct':'wrong'); }
    else { inp.onkeydown=(e)=>{if(e.key==='Enter') submitFill();}; }
    const sbtn = document.createElement('button');
    sbtn.className='submit-btn'; sbtn.textContent='提交';
    sbtn.onclick=submitFill;
    if(prev) sbtn.disabled=true;
    const rbtn = document.createElement('button');
    rbtn.className='reveal-btn'; rbtn.textContent='查看答案';
    rbtn.onclick=()=>revealFill();
    wrap.append(inp, sbtn, rbtn);
    body.appendChild(wrap);
  } else { // code
    renderCodeQuestion(body, q, prev);
  }

  // Feedback
  const fp = document.getElementById('feedback-panel');
  if(prev){
    showFeedback(q, prev);
  } else {
    fp.className='feedback-panel'; fp.style.display='none';
  }

  // Nav
  document.getElementById('btn-prev').disabled = ki===0;
  document.getElementById('btn-next').textContent = ki===total-1 ? '查看结果' : '下一题 →';
}

function renderCodeQuestion(body, q, prev){
  // Code display with blank markers
  const codeDiv = document.createElement('div');
  codeDiv.className='code-block';
  let displayed = q.code;
  q.blanks.forEach((_,i)=>{
    const marker = `___${'①②③④⑤⑥⑦⑧⑨⑩'[i]}___`;
    displayed = displayed.replace(marker, `<span class="blank-marker">${'①②③④⑤⑥⑦⑧⑨⑩'[i]}</span>`);
  });
  codeDiv.innerHTML = displayed;
  body.appendChild(codeDiv);

  // Input fields
  const inputsWrap = document.createElement('div');
  inputsWrap.className='blanks-inputs';
  q.blanks.forEach((ans,i)=>{
    const row = document.createElement('div');
    row.className='blank-row';
    const lbl = document.createElement('span');
    lbl.className='blank-label'; lbl.textContent='①②③④⑤⑥⑦⑧⑨⑩'[i];
    const field = document.createElement('input');
    field.type='text'; field.className='blank-field'; field.id='bf-'+i;
    field.placeholder=`第${i+1}空...`;
    if(prev){
      field.value=prev.chosen[i]||'';
      field.disabled=true;
      const ansDiv=document.createElement('span');
      ansDiv.className='blank-ans';
      ansDiv.style.display='inline';
      ansDiv.textContent=`正确: ${ans}`;
      const userCorrect = normalizeAns(prev.chosen[i])===normalizeAns(ans);
      field.classList.add(userCorrect?'correct':'wrong');
      row.append(lbl,field,ansDiv);
    } else {
      row.append(lbl,field);
    }
    inputsWrap.appendChild(row);
  });

  if(!prev){
    const btnRow=document.createElement('div');
    btnRow.style.cssText='display:flex;gap:10px;margin-top:12px';
    const sub=document.createElement('button');
    sub.className='submit-btn';sub.textContent='提交所有空';sub.onclick=submitCode;
    const rev=document.createElement('button');
    rev.className='reveal-btn';rev.textContent='直接查看答案';rev.onclick=()=>revealCode(false);
    btnRow.append(sub,rev);
    inputsWrap.appendChild(btnRow);
  }
  body.appendChild(inputsWrap);
}

// ─────────────────────────────────────────
// ANSWER SUBMISSION
// ─────────────────────────────────────────
function normalizeAns(s){
  if(!s) return '';
  return String(s).trim().toLowerCase().replace(/\s+/g,' ').replace(/，/g,',').replace(/（/g,'(').replace(/）/g,')');
}

function checkFill(userRaw, correctArr){
  const u = normalizeAns(userRaw);
  return correctArr.some(c => {
    const cn = normalizeAns(c);
    return u===cn || u.includes(cn) || cn.includes(u);
  });
}

function submitMC(chosen){
  const ch=CHAPTERS[state.chIdx]; const q=ch.questions[state.qIdx];
  const correct = chosen===q.ans;
  const key=ch.id+'-'+state.qIdx;
  answers[key]={chosen,correct,type:'mc'};
  saveData(); state.answered=true;
  renderQuestion();
}

function submitFill(){
  if(state.answered) return;
  const ch=CHAPTERS[state.chIdx]; const q=ch.questions[state.qIdx];
  const val=document.getElementById('fill-inp')?.value||'';
  const correct=checkFill(val,q.ans);
  const key=ch.id+'-'+state.qIdx;
  answers[key]={chosen:val,correct,type:'fill'};
  saveData(); state.answered=true;
  renderQuestion();
}

function revealFill(){
  const ch=CHAPTERS[state.chIdx]; const q=ch.questions[state.qIdx];
  const key=ch.id+'-'+state.qIdx;
  if(!answers[key]){
    const inp=document.getElementById('fill-inp');
    const val=inp?inp.value:'';
    answers[key]={chosen:val||'[查看答案]',correct:false,type:'fill',revealed:true};
    saveData(); state.answered=true;
  }
  renderQuestion();
}

function submitCode(){
  const ch=CHAPTERS[state.chIdx]; const q=ch.questions[state.qIdx];
  const vals=q.blanks.map((_,i)=>(document.getElementById('bf-'+i)||{}).value||'');
  const allCorrect=vals.every((v,i)=>normalizeAns(v)===normalizeAns(q.blanks[i]));
  const key=ch.id+'-'+state.qIdx;
  answers[key]={chosen:vals,correct:allCorrect,type:'code'};
  saveData(); state.answered=true;
  renderQuestion();
}

function revealCode(){
  const ch=CHAPTERS[state.chIdx]; const q=ch.questions[state.qIdx];
  const key=ch.id+'-'+state.qIdx;
  const vals=q.blanks.map((_,i)=>(document.getElementById('bf-'+i)||{}).value||'');
  answers[key]={chosen:vals,correct:false,type:'code',revealed:true};
  saveData(); state.answered=true;
  renderQuestion();
}

function showFeedback(q, prev){
  const fp=document.getElementById('feedback-panel');
  const ft=document.getElementById('fb-title');
  const fa=document.getElementById('fb-ans');
  const fe=document.getElementById('fb-exp');
  fp.style.display='';

  if(q.type==='mc'){
    const letters=['A','B','C','D'];
    fp.className='feedback-panel show '+(prev.correct?'correct':'wrong');
    ft.textContent=prev.correct?'✓ 正确！':'✗ 错误';
    fa.innerHTML=prev.correct?'':`正确答案：<strong>${letters[q.ans]}. ${q.opts[q.ans]}</strong>`;
    fe.textContent=q.exp;
  } else if(q.type==='fill'){
    fp.className='feedback-panel show '+(prev.correct?'correct':(prev.revealed?'neutral':'wrong'));
    ft.textContent=prev.correct?'✓ 正确！':(prev.revealed?'📖 答案':'✗ 错误');
    fa.innerHTML=`正确答案：<strong>${Array.isArray(q.ans)?q.ans[0]:q.ans}</strong>`;
    fe.textContent=q.exp;
  } else {
    const ch=CHAPTERS[state.chIdx];
    fp.className='feedback-panel show neutral';
    ft.textContent='📖 代码答案';
    fa.innerHTML='<strong>各空答案：</strong> '+q.blanks.map((b,i)=>`${('①②③④⑤⑥⑦⑧⑨⑩')[i]} <code style="background:var(--s2);padding:1px 5px;border-radius:3px;color:#79c0ff">${b}</code>`).join('　');
    fe.textContent=q.exp;
  }
}

// ─────────────────────────────────────────
// NAVIGATION
// ─────────────────────────────────────────
function prevQ(){
  if(state.qIdx>0){ state.qIdx--; renderQuestion(); }
}
function nextQ(){
  const ch=CHAPTERS[state.chIdx];
  if(state.qIdx<ch.questions.length-1){ state.qIdx++; renderQuestion(); }
  else { showResults(); }
}

// ─────────────────────────────────────────
// RESULTS
// ─────────────────────────────────────────
function showResults(){
  const ch=CHAPTERS[state.chIdx];
  const total=ch.questions.length;
  const done=ch.questions.filter((_,qi)=>answers[ch.id+'-'+qi]!==undefined).length;
  const correct=ch.questions.filter((_,qi)=>{const a=answers[ch.id+'-'+qi];return a&&a.correct;}).length;

  document.getElementById('res-score').textContent=`${correct} / ${total}`;
  document.getElementById('res-sub').textContent=`${ch.title} · 答对 ${Math.round(correct/total*100)}%`;

  // Wrong list
  const wl=document.getElementById('wrong-list');
  const ws=document.getElementById('wrong-section');
  const wrongs=ch.questions.map((q,qi)=>{const a=answers[ch.id+'-'+qi];return{q,qi,a};}).filter(x=>x.a&&!x.a.correct);
  if(wrongs.length){
    ws.style.display='';
    wl.innerHTML=wrongs.map(({q,qi,a})=>{
      const letters=['A','B','C','D'];
      let ans='';
      if(q.type==='mc') ans=`正确: ${letters[q.ans]}. ${q.opts[q.ans]}`;
      else if(q.type==='fill') ans=`正确: ${Array.isArray(q.ans)?q.ans[0]:q.ans}`;
      else ans=`正确答案见解析`;
      return `<div class="wrong-item">
        <div class="wi-q">Q${qi+1}. ${q.q.replace(/<[^>]+>/g,'').substring(0,60)}...</div>
        <div class="wi-ans">${ans}</div>
        ${q.exp?`<div style="font-size:.82rem;color:var(--muted);margin-top:4px">${q.exp}</div>`:''}
      </div>`;
    }).join('');
  } else {
    ws.style.display='none';
  }

  document.getElementById('ch-results').innerHTML=`
    <div class="ch-result-row">
      <span class="ch-name">${ch.title}</span>
      <span class="ch-score">${correct} / ${total}</span>
    </div>`;

  showPage('results');
}

function redoChapter(){
  const ch=CHAPTERS[state.chIdx];
  ch.questions.forEach((_,qi)=>delete answers[ch.id+'-'+qi]);
  saveData();
  state.qIdx=0; state.answered=false;
  renderQuestion();
  showPage('quiz');
}

// ─────────────────────────────────────────
// INIT
// ─────────────────────────────────────────
loadData();
renderHome();
</script>
</body>
</html>
