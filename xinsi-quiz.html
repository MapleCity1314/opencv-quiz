<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>新思想概论 复习题</title>
<style>
:root{--bg:#0d1117;--s1:#161b22;--s2:#21262d;--ac:#ef4444;--ac2:#b91c1c;--green:#3fb950;--red:#f85149;--yellow:#e3b341;--text:#e6edf3;--muted:#8b949e;--border:#30363d;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh}
.page{display:none;min-height:100vh;padding:20px}
.page.active{display:block}
.home-header{text-align:center;padding:40px 0 30px}
.home-header h1{font-size:2.2rem;background:linear-gradient(135deg,var(--ac),#fca5a5);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.home-header p{color:var(--muted);font-size:1rem}
.chapter-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;max-width:1200px;margin:0 auto 30px}
.ch-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:18px;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.ch-card:hover{border-color:var(--ac);transform:translateY(-2px);box-shadow:0 4px 20px rgba(239,68,68,.15)}
.ch-card h3{font-size:.95rem;margin-bottom:5px;color:var(--text)}
.ch-card .meta{font-size:.8rem;color:var(--muted);margin-bottom:10px}
.ch-card .progress-wrap{background:var(--s2);border-radius:4px;height:5px;margin-bottom:7px}
.ch-card .progress-bar{background:linear-gradient(90deg,var(--ac),var(--ac2));height:5px;border-radius:4px;transition:width .4s}
.ch-card .score-label{font-size:.78rem;color:var(--muted)}
.ch-card .score-label span{color:var(--ac);font-weight:600}
.ch-num{position:absolute;top:14px;right:14px;font-size:1.6rem;font-weight:700;color:var(--border)}
.reset-btn{display:block;margin:0 auto 16px;background:transparent;border:1px solid var(--border);color:var(--muted);padding:8px 20px;border-radius:6px;cursor:pointer;font-size:.85rem;transition:all .2s}
.reset-btn:hover{border-color:var(--red);color:var(--red)}
.nav-links{display:flex;justify-content:center;gap:12px;margin-top:24px;flex-wrap:wrap}
.nav-link{font-size:.82rem;color:var(--muted);text-decoration:none;padding:5px 14px;border:1px solid var(--border);border-radius:20px;transition:all .2s}
.nav-link:hover{border-color:var(--ac);color:var(--ac)}
.quiz-topbar{display:flex;align-items:center;gap:12px;max-width:800px;margin:0 auto 16px;padding:0 4px}
.back-btn{background:transparent;border:1px solid var(--border);color:var(--muted);padding:6px 14px;border-radius:6px;cursor:pointer;font-size:.85rem;white-space:nowrap;transition:all .2s}
.back-btn:hover{border-color:var(--ac);color:var(--text)}
.topbar-info{flex:1}
.topbar-info h2{font-size:.95rem;color:var(--text);margin-bottom:3px}
.topbar-info .prog-text{font-size:.8rem;color:var(--muted)}
.top-progress-wrap{background:var(--s2);border-radius:4px;height:4px;max-width:800px;margin:0 auto 20px}
.top-progress-bar{background:linear-gradient(90deg,var(--ac),var(--ac2));height:4px;border-radius:4px;transition:width .3s}
.q-card{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:24px;max-width:800px;margin:0 auto 16px}
.type-badge{display:inline-block;font-size:.72rem;font-weight:600;padding:2px 10px;border-radius:20px;margin-bottom:12px;letter-spacing:.5px}
.type-badge.mc{background:#ef444420;color:#ef4444}
.type-badge.tf{background:#8b5cf620;color:#a78bfa}
.type-badge.qa{background:#10b98120;color:#34d399}
.q-text{font-size:1rem;line-height:1.7;margin-bottom:18px}
.opts{display:flex;flex-direction:column;gap:10px}
.opt-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:12px 16px;border-radius:8px;cursor:pointer;text-align:left;font-size:.9rem;line-height:1.5;transition:all .2s}
.opt-btn:hover:not(:disabled){border-color:var(--ac);background:#ef444410}
.opt-btn.correct{border-color:var(--green);background:#3fb95020;color:var(--green)}
.opt-btn.wrong{border-color:var(--red);background:#f8514920;color:var(--red)}
.opt-btn.show-correct{border-color:var(--green);background:#3fb95010;color:var(--green)}
.opt-btn:disabled{cursor:not-allowed;opacity:.85}
.tf-opts{display:flex;gap:12px}
.tf-btn{flex:1;padding:14px;border-radius:8px;cursor:pointer;font-size:1rem;font-weight:600;border:1px solid var(--border);background:var(--s2);color:var(--text);transition:all .2s}
.tf-btn:hover:not(:disabled){border-color:var(--ac)}
.tf-btn.correct{border-color:var(--green);background:#3fb95020;color:var(--green)}
.tf-btn.wrong{border-color:var(--red);background:#f8514920;color:var(--red)}
.tf-btn.show-correct{border-color:var(--green);background:#3fb95010;color:var(--green)}
.tf-btn:disabled{cursor:not-allowed;opacity:.85}
.exp-panel{margin-top:14px;background:var(--s2);border-radius:8px;padding:14px;border-left:3px solid var(--ac);display:none}
.exp-panel.show{display:block}
.exp-panel p,.exp-panel li{font-size:.88rem;line-height:1.7;color:var(--muted)}
.exp-panel strong,.exp-panel b{color:var(--text)}
.answer-box{background:var(--s2);border-radius:8px;padding:14px;margin-top:12px;border-left:3px solid #34d399;display:none;font-size:.88rem;line-height:1.8;color:var(--muted)}
.answer-box.show{display:block}
.answer-box strong{color:var(--text)}
.reveal-btn{background:var(--s2);border:1px solid #34d39940;color:#34d399;padding:9px 18px;border-radius:7px;cursor:pointer;font-size:.87rem;margin-top:10px;transition:all .2s}
.reveal-btn:hover{background:#34d39920;border-color:#34d399}
.nav-btns{display:flex;gap:10px;max-width:800px;margin:0 auto;justify-content:space-between}
.nav-btn{background:var(--s2);border:1px solid var(--border);color:var(--text);padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.9rem;transition:all .2s}
.nav-btn:hover:not(:disabled){border-color:var(--ac)}
.nav-btn:disabled{opacity:.4;cursor:not-allowed}
.nav-btn.primary{background:var(--ac);border-color:var(--ac);color:#fff}
.nav-btn.primary:hover{background:var(--ac2);border-color:var(--ac2)}
.results-wrap{max-width:700px;margin:0 auto;padding:20px 0}
.results-wrap h2{font-size:1.6rem;text-align:center;margin-bottom:6px}
.results-sub{text-align:center;color:var(--muted);font-size:.9rem;margin-bottom:30px}
.score-big{text-align:center;font-size:3.5rem;font-weight:700;color:var(--ac);margin-bottom:6px}
.ch-result-list{display:flex;flex-direction:column;gap:10px}
.ch-result-item{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:14px 18px;display:flex;align-items:center;gap:12px}
.ch-result-item h4{font-size:.9rem;flex:1}
.ch-result-item .sc{font-size:.88rem;color:var(--muted)}
.ch-result-item .sc span{color:var(--ac);font-weight:600}
.results-actions{display:flex;gap:10px;justify-content:center;margin-top:24px;flex-wrap:wrap}
.results-actions button{padding:10px 22px;border-radius:8px;cursor:pointer;font-size:.9rem;border:1px solid var(--border);background:var(--s2);color:var(--text);transition:all .2s}
.results-actions button:hover{border-color:var(--ac);color:var(--ac)}
.tf-result-hint{font-size:.82rem;margin-top:8px;color:var(--muted)}
.tf-result-hint .correct-ans{color:var(--green);font-weight:600}
</style>
</head>
<body>

<section id="page-home" class="page active">
  <div class="home-header">
    <h1>《新思想概论》复习题</h1>
    <p>2025-2026-2学期 · 共18章 · 单选题 + 判断题 + 论述题</p>
  </div>
  <div class="chapter-grid" id="chapterGrid"></div>
  <div style="text-align:center">
    <button class="reset-btn" onclick="resetAll()">重置所有答题记录</button>
  </div>
  <div class="nav-links">
    <a href="quiz.html" class="nav-link">← OpenCV 复习题</a>
    <a href="dl-quiz.html" class="nav-link">← 深度学习 复习题</a>
    <a href="index.html" class="nav-link">← 返回首页</a>
  </div>
</section>

<section id="page-quiz" class="page">
  <div class="quiz-topbar">
    <button class="back-btn" onclick="goHome()">← 返回</button>
    <div class="topbar-info">
      <h2 id="qChapTitle"></h2>
      <div class="prog-text" id="qProgText"></div>
    </div>
  </div>
  <div class="top-progress-wrap"><div class="top-progress-bar" id="topBar"></div></div>
  <div class="q-card" id="qCard"></div>
  <div class="nav-btns">
    <button class="nav-btn" id="prevBtn" onclick="prevQ()">← 上一题</button>
    <button class="nav-btn primary" id="nextBtn" onclick="nextQ()" disabled>下一题 →</button>
  </div>
</section>

<section id="page-results" class="page">
  <div class="results-wrap">
    <h2>本章答题完成</h2>
    <p class="results-sub" id="resChapName"></p>
    <div class="score-big" id="resBig"></div>
    <p style="text-align:center;color:var(--muted);margin-bottom:24px" id="resDetail"></p>
    <div class="results-actions">
      <button onclick="retryChap()">重新作答本章</button>
      <button onclick="goHome()">返回章节选择</button>
    </div>
  </div>
</section>

<script>
const CHAPTERS = [
{id:'intro',title:'导论',sub:'习近平新时代中国特色社会主义思想概论',
 mc:[
  {q:'党的二十大提出的"六个必须坚持"是习近平新时代中国特色社会主义思想的世界观、方法论和贯穿其中的立场观点方法的重要体现。下列哪一项不属于"六个必须坚持"的内容？',o:['必须坚持人民至上','必须坚持自信自立','必须坚持问题导向','必须坚持改革开放'],a:3},

  {q:'坚持和发展中国特色社会主义，总任务是（ ）',o:['完善和发展中国特色社会主义制度、推进国家治理体系和治理能力现代化','建设中国特色社会主义法治体系、建设社会主义法治国家','实现社会主义现代化和中华民族伟大复兴，在全面建成小康社会的基础上，分两步走在本世纪中叶建成富强民主文明和谐美丽的社会主义现代化强国，以中国式现代化推进中华民族伟大复兴','建设一支听党指挥、能打胜仗、作风优良的人民军队，把人民军队建设成为世界一流军队'],a:2},

 ],

  {q:'习近平新时代中国特色社会主义思想，正是在中华民族迎来从站起来、富起来到强起来的伟大飞跃，实现中华民族伟大复兴进入不可逆转的历史进程中创立并不断丰富发展的。',a:true},

{id:'ch1',title:'第一章',sub:'中国特色社会主义进入新时代',

  {q:'中国特色社会主义事业"五位一体"总体布局是指统筹推进（ ）',o:['经济建设、政治建设、文化建设、社会建设、生态文明建设','经济建设、政治建设、文化建设、社会建设、党的建设','经济建设、政治建设、文化建设、法治建设、生态文明建设','经济建设、政治建设、教育建设、社会建设、生态文明建设'],a:0},

// Build questions array for each chapter
CHAPTERS.forEach(ch => {
  ch.questions = [];
  (ch.mc||[]).forEach(q => ch.questions.push({...q, type:'mc'}));
  (ch.tf||[]).forEach(q => ch.questions.push({...q, type:'tf'}));
  (ch.qa||[]).forEach(q => ch.questions.push({...q, type:'qa'}));
});

const LS_KEY = 'xs_answers';
let answers = JSON.parse(localStorage.getItem(LS_KEY)||'{}');
let curChap = 0, curQ = 0;

function saveAnswers(){localStorage.setItem(LS_KEY,JSON.stringify(answers));}

function getChapKey(ci,qi){return `${ci}-${qi}`;}

function show(id){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.getElementById(id).classList.add('active');}

function renderHome(){
  const grid = document.getElementById('chapterGrid');
  grid.innerHTML = CHAPTERS.map((ch,i)=>{
    const qs = ch.questions;
    const total = qs.length;
    const mcCount = ch.mc?.length||0, tfCount = ch.tf?.length||0, qaCount = ch.qa?.length||0;
    let answered=0, correct=0;
    qs.forEach((_,qi)=>{
      const k = getChapKey(i,qi);
      if(answers[k]!==undefined){answered++;if(answers[k].correct)correct++;}
    });
    const pct = total?Math.round(answered/total*100):0;
    const scorePct = answered?(Math.round(correct/answered*100)):null;
    return `<div class="ch-card" onclick="startChapter(${i})">
      <div class="ch-num">${i===0?'导':ch.title.replace('第','').replace('章','')}</div>
      <h3>${ch.title}${ch.sub?'<br><small style="color:var(--muted);font-size:.8rem">'+ ch.sub +'</small>':''}</h3>
      <div class="meta">单选×${mcCount} 判断×${tfCount} 论述×${qaCount}</div>
      <div class="progress-wrap"><div class="progress-bar" style="width:${pct}%"></div></div>
      <div class="score-label">已答 <span>${answered}/${total}</span>${scorePct!==null?' · 正确率 <span>'+scorePct+'%</span>':''}</div>
    </div>`;
  }).join('');
}

function startChapter(ci){
  curChap=ci; curQ=0;
  show('page-quiz');
  renderQ();
}

function renderQ(){
  const ch = CHAPTERS[curChap];
  const qs = ch.questions;
  const q = qs[curQ];
  const total = qs.length;
  const key = getChapKey(curChap,curQ);
  const prev = answers[key];

  document.getElementById('qChapTitle').textContent = ch.title + (ch.sub?' · '+ch.sub:'');
  document.getElementById('qProgText').textContent = `第 ${curQ+1} 题 / 共 ${total} 题`;
  document.getElementById('topBar').style.width = ((curQ+1)/total*100)+'%';
  document.getElementById('prevBtn').disabled = curQ===0;
  document.getElementById('nextBtn').disabled = prev===undefined && q.type!=='qa';

  const card = document.getElementById('qCard');
  if(q.type==='mc'){
    card.innerHTML = `
      <span class="type-badge mc">单选题</span>
      <div class="q-text">${q.q}</div>
      <div class="opts">${q.o.map((opt,i)=>{
        let cls='opt-btn';
        if(prev!==undefined){
          if(i===q.a) cls+=' show-correct';
          if(prev.chosen===i && prev.chosen!==q.a) cls+=' wrong';
          else if(prev.chosen===i) cls+=' correct';
        }
        return `<button class="${cls}" onclick="answerMC(${i})" ${prev!==undefined?'disabled':''}>${'ABCD'[i]}. ${opt}</button>`;
      }).join('')}</div>
      <div class="exp-panel ${prev!==undefined?'show':''}" id="expPanel">
        <p>✓ 正确答案：${'ABCD'[q.a]}. ${q.o[q.a]}</p>
        ${q.exp?'<p>'+q.exp+'</p>':''}
      </div>`;
  } else if(q.type==='tf'){
    const trueLabel='✓ 正确', falseLabel='✗ 错误';
    let trueCls='tf-btn', falseCls='tf-btn';
    let hint='';
    if(prev!==undefined){
      if(q.a===true){ trueCls+=' show-correct'; if(prev.chosen===false) falseCls+=' wrong';}
      else { falseCls+=' show-correct'; if(prev.chosen===true) trueCls+=' wrong';}
      hint = `<div class="tf-result-hint">正确答案：<span class="correct-ans">${q.a?'✓ 正确':'✗ 错误'}</span>${q.exp?' · '+q.exp:''}</div>`;
    }
    card.innerHTML = `
      <span class="type-badge tf">判断题</span>
      <div class="q-text">${q.q}</div>
      <div class="tf-opts">
        <button class="${trueCls}" onclick="answerTF(true)" ${prev!==undefined?'disabled':''}>${trueLabel}</button>
        <button class="${falseCls}" onclick="answerTF(false)" ${prev!==undefined?'disabled':''}>${falseLabel}</button>
      </div>
      ${hint}`;
  } else {
    const seen = prev!==undefined;
    card.innerHTML = `
      <span class="type-badge qa">论述题</span>
      <div class="q-text">${q.q}</div>
      <button class="reveal-btn" onclick="revealQA()" ${seen?'style="display:none"':''}>查看参考答案 ▼</button>
      <div class="answer-box ${seen?'show':''}" id="ansBox">${q.a}</div>`;
    if(!seen) document.getElementById('nextBtn').disabled = false;
  }
}

function answerMC(chosen){
  const q = CHAPTERS[curChap].questions[curQ];
  const correct = chosen === q.a;
  const key = getChapKey(curChap,curQ);
  answers[key] = {chosen, correct, type:'mc'};
  saveAnswers();
  renderQ();
  document.getElementById('nextBtn').disabled = false;
}

function answerTF(val){
  const q = CHAPTERS[curChap].questions[curQ];
  const correct = val === q.a;
  const key = getChapKey(curChap,curQ);
  answers[key] = {chosen:val, correct, type:'tf'};
  saveAnswers();
  renderQ();
  document.getElementById('nextBtn').disabled = false;
}

function revealQA(){
  const key = getChapKey(curChap,curQ);
  answers[key] = {correct:true, type:'qa'};
  saveAnswers();
  document.querySelector('.reveal-btn').style.display='none';
  document.getElementById('ansBox').classList.add('show');
  document.getElementById('nextBtn').disabled = false;
}

function nextQ(){
  const qs = CHAPTERS[curChap].questions;
  if(curQ < qs.length-1){ curQ++; renderQ(); }
  else { showResults(); }
}

function prevQ(){
  if(curQ>0){ curQ--; renderQ(); }
}

function showResults(){
  const ch = CHAPTERS[curChap];
  const qs = ch.questions;
  let mc_c=0,mc_t=0,tf_c=0,tf_t=0,qa_t=0;
  qs.forEach((q,qi)=>{
    const k=getChapKey(curChap,qi);
    const a=answers[k];
    if(q.type==='mc'){mc_t++;if(a?.correct)mc_c++;}
    else if(q.type==='tf'){tf_t++;if(a?.correct)tf_c++;}
    else{qa_t++;}
  });
  const scored=mc_c+tf_c, total_scored=mc_t+tf_t;
  document.getElementById('resChapName').textContent = ch.title + (ch.sub?' · '+ch.sub:'');
  document.getElementById('resBig').textContent = total_scored>0?Math.round(scored/total_scored*100)+'%':'—';
  document.getElementById('resDetail').textContent =
    `单选 ${mc_c}/${mc_t} · 判断 ${tf_c}/${tf_t} · 论述 ${qa_t}题已查看`;
  show('page-results');
  renderHome();
}

function retryChap(){
  const qs = CHAPTERS[curChap].questions;
  qs.forEach((_,qi)=>{ delete answers[getChapKey(curChap,qi)]; });
  saveAnswers();
  startChapter(curChap);
}

function goHome(){ show('page-home'); renderHome(); }

function resetAll(){
  if(!confirm('确定重置所有答题记录？')) return;
  answers={};
  saveAnswers();
  renderHome();
}

renderHome();
</script>
